<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageOne V2</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-container">
                <div class="logo-badge">P1</div>
                <div class="logo-text">PageOne</div>
            </div>
            <nav class="stages-nav">
                <a href="#" class="stage-link active"><span class="badge">1</span> Pitch</a>
                <a href="#" class="stage-link disabled"><span class="badge">2</span> Outline</a>
                <a href="#" class="stage-link disabled"><span class="badge">3</span> Characters</a>
                <a href="#" class="stage-link disabled"><span class="badge">4</span> Beats</a>
                <a href="#" class="stage-link disabled"><span class="badge">5</span> Scenes</a>
                <a href="#" class="stage-link disabled"><span class="badge">6</span> Draft</a>
                <a href="#" class="stage-link disabled"><span class="badge">7</span> Edit</a>
                <a href="#" class="stage-link disabled"><span class="badge">8</span> Polish</a>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="workspace-header">
                <h1>Stage 1: Pitch Generation</h1>
                <p>Brainstorm three distinct, high-concept movie pitch options.</p>
            </header>

            <section class="prompt-section">
                <textarea id="promptInput" placeholder="Enter your raw story idea here..."></textarea>
                <div class="action-row">
                    <label for="pdfUpload" class="icon-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                            class="lucide lucide-paperclip">
                            <path
                                d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48" />
                        </svg>
                        Attach PDF
                    </label>
                    <input type="file" id="pdfUpload" accept="application/pdf" class="hidden">
                    <span id="fileNameDisplay" class="file-name"></span>
                    <button id="generateBtn" class="primary-btn">Generate Pitches</button>
                </div>
            </section>

            <!-- Loading State -->
            <div id="loadingState" class="hidden">
                <div class="spinner"></div>
                <p>Generating high-concept pitches...</p>
            </div>

            <!-- Pitch Results Container -->
            <div id="resultsContainer" class="results-grid">
                <!-- Cards will be injected here dynamically -->
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
